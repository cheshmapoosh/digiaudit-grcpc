spring:
  application:
    name: grcpc-api

  servlet:
    multipart:
      max-file-size: ${DOCUMENT_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${DOCUMENT_MULTIPART_MAX_REQUEST_SIZE:100MB}

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1}
    username: ${DB_USERNAME:GRCPC}
    password: ${DB_PASSWORD:grcpc}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:GRCPC}
        type:
          preferred_uuid_jdbc_type: VARCHAR

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    default-schema: ${DB_SCHEMA:GRCPC}
    schemas: ${DB_SCHEMA:GRCPC}
    locations: classpath:db/migration/common,classpath:db/migration/oracle
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  logging:
    path: ${APP_LOGGING_PATH:logs}
  minio:
    enabled: ${MINIO_ENABLED:true}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:grcpc-documents}
    presigned-url-expiry-minutes: ${MINIO_PRESIGNED_URL_EXPIRY_MINUTES:15}
    default-max-upload-size-mb: ${DOCUMENT_DEFAULT_MAX_UPLOAD_SIZE_MB:20}
    temp-ttl-minutes: ${DOCUMENT_TEMP_TTL_MINUTES:240}
    temp-cleanup-fixed-delay-ms: ${DOCUMENT_TEMP_CLEANUP_FIXED_DELAY_MS:3600000}
    feature-max-upload-size-mb:
      ORGANIZATION: ${DOCUMENT_ORGANIZATION_MAX_UPLOAD_SIZE_MB:20}
      PROCESS: ${DOCUMENT_PROCESS_MAX_UPLOAD_SIZE_MB:20}
      CONTROL: ${DOCUMENT_CONTROL_MAX_UPLOAD_SIZE_MB:20}
      RISK: ${DOCUMENT_RISK_MAX_UPLOAD_SIZE_MB:20}
      REGULATION: ${DOCUMENT_REGULATION_MAX_UPLOAD_SIZE_MB:20}
      POLICY: ${DOCUMENT_POLICY_MAX_UPLOAD_SIZE_MB:20}
      OBJECTIVE: ${DOCUMENT_OBJECTIVE_MAX_UPLOAD_SIZE_MB:20}
      ACCOUNT_GROUP: ${DOCUMENT_ACCOUNT_GROUP_MAX_UPLOAD_SIZE_MB:20}

logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.digiaudit.grcpc: ${APP_LOG_LEVEL:DEBUG}
