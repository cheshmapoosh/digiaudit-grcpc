name: grcpc-dev

services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: grcpc-dev-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: GRCPC
      APP_USER_PASSWORD: grcpc
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: grcpc-dev-minio
    restart: unless-stopped
    command: server ${MINIO_DATA_DIR:-/var/lib/minio/data} --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - type: bind
        source: ./data/minio
        target: /data

  minio-init:
    image: minio/mc:latest
    container_name: grcpc-dev-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/grcpc-documents || true;
      exit 0;
      "
    restart: "no"

volumes:
  oracle_data:
    name: grcpc_dev_oradata