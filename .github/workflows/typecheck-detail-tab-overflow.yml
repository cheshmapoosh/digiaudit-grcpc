name: Typecheck detail tab overflow

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/detail-tabs-responsive-overflow
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: grcpc-ui/package-lock.json

      - name: Install dependencies
        working-directory: grcpc-ui
        run: npm ci

      - name: Run TypeScript check
        working-directory: grcpc-ui
        run: npm run typecheck

      - name: Remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/typecheck-detail-tab-overflow.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary detail tab typecheck workflow"
          git push origin HEAD:fix/detail-tabs-responsive-overflow
