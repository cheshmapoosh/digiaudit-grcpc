name: Capture detail tab typecheck

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/detail-tabs-responsive-overflow
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: grcpc-ui/package-lock.json

      - name: Install dependencies
        working-directory: grcpc-ui
        run: npm ci

      - name: Capture TypeScript output
        shell: bash
        run: |
          cd grcpc-ui
          npm run typecheck > ../typecheck-detail-tabs.log 2>&1 || true

      - name: Commit captured output
        shell: bash
        run: |
          rm .github/workflows/typecheck-detail-tab-overflow.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: capture detail tab typecheck output"
          git push origin HEAD:fix/detail-tabs-responsive-overflow
