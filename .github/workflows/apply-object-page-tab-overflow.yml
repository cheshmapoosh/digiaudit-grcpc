name: Apply object page tab overflow

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/object-page-detail-tab-overflow
          fetch-depth: 0

      - name: Use shared detail tab container in object pages
        shell: python
        run: |
          from pathlib import Path
          import re

          object_pages = [
              Path("grcpc-ui/src/features/account-group/pages/AccountGroupObjectPage.tsx"),
              Path("grcpc-ui/src/features/organization/pages/OrganizationObjectPage.tsx"),
              Path("grcpc-ui/src/features/process/pages/ProcessObjectPage.tsx"),
              Path("grcpc-ui/src/features/objective/pages/ObjectiveObjectPage.tsx"),
              Path("grcpc-ui/src/features/risk/pages/RiskObjectPage.tsx"),
              Path("grcpc-ui/src/features/policy/pages/PolicyObjectPage.tsx"),
              Path("grcpc-ui/src/features/regulation/pages/RegulationObjectPage.tsx"),
          ]

          shared_import = 'import { DetailTabContainer } from "@/shared/components/DetailTabContainer";\n'
          ui5_import_end = '} from "@ui5/webcomponents-react";\n'

          for path in object_pages:
              text = path.read_text(encoding="utf-8")

              text, import_count = re.subn(
                  r'(?m)^[ \t]*TabContainer,\r?\n',
                  "",
                  text,
                  count=1,
              )
              if import_count != 1:
                  raise RuntimeError(f"Expected one TabContainer import in {path}; found {import_count}")

              if ui5_import_end not in text:
                  raise RuntimeError(f"UI5 React import block not found in {path}")
              if shared_import not in text:
                  text = text.replace(
                      ui5_import_end,
                      f"{ui5_import_end}\n{shared_import}",
                      1,
                  )

              open_count = text.count("<TabContainer")
              close_count = text.count("</TabContainer>")
              if open_count != 1 or close_count != 1:
                  raise RuntimeError(
                      f"Expected one TabContainer element in {path}; "
                      f"found open={open_count}, close={close_count}"
                  )

              text = text.replace("<TabContainer", "<DetailTabContainer", 1)
              text = text.replace("</TabContainer>", "</DetailTabContainer>", 1)
              path.write_text(text, encoding="utf-8")

      - name: Verify object page coverage
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            grcpc-ui/src/features/account-group/pages/AccountGroupObjectPage.tsx \
            grcpc-ui/src/features/organization/pages/OrganizationObjectPage.tsx \
            grcpc-ui/src/features/process/pages/ProcessObjectPage.tsx \
            grcpc-ui/src/features/objective/pages/ObjectiveObjectPage.tsx \
            grcpc-ui/src/features/risk/pages/RiskObjectPage.tsx \
            grcpc-ui/src/features/policy/pages/PolicyObjectPage.tsx \
            grcpc-ui/src/features/regulation/pages/RegulationObjectPage.tsx
          do
            grep -q 'DetailTabContainer' "$file"
            if grep -q '<TabContainer' "$file"; then
              echo "Direct TabContainer remains in $file" >&2
              exit 1
            fi
          done

      - name: Commit source changes
        shell: bash
        run: |
          rm .github/workflows/apply-object-page-tab-overflow.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ui): apply responsive overflow to object page tabs"
          git push origin HEAD:fix/object-page-detail-tab-overflow
