name: Apply close-only details panels

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/risk-policy-details-close-only
          fetch-depth: 0

      - name: Update Risk and Policy summary panels
        shell: python
        run: |
          from pathlib import Path

          paths = [
              Path("grcpc-ui/src/features/risk/components/RiskSummaryPanel.tsx"),
              Path("grcpc-ui/src/features/policy/components/PolicySummaryPanel.tsx"),
          ]

          close_footer = [
              "            <Bar\n",
              "                endContent={\n",
              "                    <Button\n",
              "                        design=\"Transparent\"\n",
              "                        disabled={busy}\n",
              "                        style={ACTION_BUTTON_STYLE}\n",
              "                        onClick={onCancel}\n",
              "                    >\n",
              "                        {t(\"common.close\", { defaultValue: \"بستن\" })}\n",
              "                    </Button>\n",
              "                }\n",
              "            />\n",
          ]

          for path in paths:
              lines = path.read_text(encoding="utf-8").splitlines(keepends=True)

              edit_parameter_indexes = [
                  index for index, line in enumerate(lines) if line.strip() == "onEdit,"
              ]
              if len(edit_parameter_indexes) != 1:
                  raise RuntimeError(f"Expected one onEdit parameter in {path}")
              del lines[edit_parameter_indexes[0]]

              edit_label = next(
                  index
                  for index, line in enumerate(lines)
                  if 't("common.edit", { defaultValue: "ویرایش" })' in line
              )
              cancel_label = next(
                  index
                  for index, line in enumerate(lines[edit_label:], start=edit_label)
                  if 't("common.cancel", { defaultValue: "انصراف" })' in line
              )
              footer_start = max(
                  index
                  for index, line in enumerate(lines[:edit_label])
                  if line.strip() == "<Bar"
              )
              footer_end = next(
                  index
                  for index, line in enumerate(lines[cancel_label:], start=cancel_label)
                  if line.strip() == "/>"
              )

              lines[footer_start : footer_end + 1] = close_footer
              path.write_text("".join(lines), encoding="utf-8")

      - name: Commit source changes
        shell: bash
        run: |
          rm .github/workflows/apply-close-only-panels.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(summary): keep only close action in details panels"
          git push origin HEAD:fix/risk-policy-details-close-only
