name: Apply risk and policy close-only patch

on:
  push:
    branches:
      - fix/risk-policy-details-close-only
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/risk-policy-details-close-only
          fetch-depth: 0

      - name: Apply focused UI patch
        shell: python
        run: |
          from pathlib import Path

          files = [
              Path("grcpc-ui/src/features/risk/components/RiskSummaryPanel.tsx"),
              Path("grcpc-ui/src/features/policy/components/PolicySummaryPanel.tsx"),
          ]

          old_destructure = "    onEdit,\n    onCancel,\n"
          new_destructure = "    onCancel,\n"

          old_footer = '''            <Bar
                endContent={
                    <>
                        <Button
                            design="Emphasized"
                            disabled={!value || busy}
                            style={ACTION_BUTTON_STYLE}
                            onClick={() => value && onEdit?.(value.id)}
                        >
                            {t("common.edit", { defaultValue: "ویرایش" })}
                        </Button>

                        <Button
                            design="Transparent"
                            disabled={busy}
                            style={ACTION_BUTTON_STYLE}
                            onClick={onCancel}
                        >
                            {t("common.cancel", { defaultValue: "انصراف" })}
                        </Button>
                    </>
                }
            />'''

          new_footer = '''            <Bar
                endContent={
                    <Button
                        design="Transparent"
                        disabled={busy}
                        style={ACTION_BUTTON_STYLE}
                        onClick={onCancel}
                    >
                        {t("common.close", { defaultValue: "بستن" })}
                    </Button>
                }
            />'''

          for path in files:
              text = path.read_text(encoding="utf-8")
              if text.count(old_destructure) != 1:
                  raise RuntimeError(f"Unexpected onEdit destructuring in {path}")
              if text.count(old_footer) != 1:
                  raise RuntimeError(f"Unexpected footer structure in {path}")

              text = text.replace(old_destructure, new_destructure, 1)
              text = text.replace(old_footer, new_footer, 1)
              path.write_text(text, encoding="utf-8")

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/apply-risk-policy-close-only.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(summary): show only close action for risk and policy"
          git push origin HEAD:fix/risk-policy-details-close-only
