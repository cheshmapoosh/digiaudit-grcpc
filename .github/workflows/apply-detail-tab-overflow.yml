name: Apply responsive detail tab overflow

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/detail-tabs-responsive-overflow
          fetch-depth: 0

      - name: Add shared detail tab container
        shell: python
        run: |
          from pathlib import Path
          import re

          shared_component = Path("grcpc-ui/src/shared/components/DetailTabContainer.tsx")
          shared_component.write_text(
              '''import type { ComponentProps } from "react";
          import { Button, TabContainer } from "@ui5/webcomponents-react";

          export type DetailTabContainerProps = ComponentProps<typeof TabContainer>;

          export function DetailTabContainer({
              overflowButton,
              overflowMode = "End",
              startOverflowButton,
              ...props
          }: DetailTabContainerProps) {
              return (
                  <TabContainer
                      {...props}
                      overflowMode={overflowMode}
                      overflowButton={
                          overflowButton ?? (
                              <Button design="Transparent" tooltip="...">
                                  ...
                              </Button>
                          )
                      }
                      startOverflowButton={
                          startOverflowButton ?? (
                              <Button design="Transparent" tooltip="...">
                                  ...
                              </Button>
                          )
                      }
                  />
              );
          }
          '''.replace("          ", ""),
              encoding="utf-8",
          )

          summary_panels = [
              Path("grcpc-ui/src/features/account-group/components/AccountGroupSummaryPanel.tsx"),
              Path("grcpc-ui/src/features/process/components/ProcessSummaryPanel.tsx"),
              Path("grcpc-ui/src/features/objective/components/ObjectiveSummaryPanel.tsx"),
              Path("grcpc-ui/src/features/risk/components/RiskSummaryPanel.tsx"),
              Path("grcpc-ui/src/features/policy/components/PolicySummaryPanel.tsx"),
              Path("grcpc-ui/src/features/regulation/components/RegulationSummaryPanel.tsx"),
          ]

          shared_import = 'import { DetailTabContainer } from "@/shared/components/DetailTabContainer";\n'
          ui5_import_end = '} from "@ui5/webcomponents-react";\n'

          for path in summary_panels:
              text = path.read_text(encoding="utf-8")

              text, import_count = re.subn(
                  r'(?m)^[ \t]*TabContainer,\r?\n',
                  "",
                  text,
                  count=1,
              )
              if import_count != 1:
                  raise RuntimeError(f"Expected one TabContainer import in {path}")

              if ui5_import_end not in text:
                  raise RuntimeError(f"UI5 React import block not found in {path}")
              if shared_import not in text:
                  text = text.replace(
                      ui5_import_end,
                      f"{ui5_import_end}\n{shared_import}",
                      1,
                  )

              open_count = text.count("<TabContainer")
              close_count = text.count("</TabContainer>")
              if open_count != 1 or close_count != 1:
                  raise RuntimeError(
                      f"Expected one TabContainer element in {path}; "
                      f"found open={open_count}, close={close_count}"
                  )

              text = text.replace("<TabContainer", "<DetailTabContainer", 1)
              text = text.replace("</TabContainer>", "</DetailTabContainer>", 1)
              path.write_text(text, encoding="utf-8")

      - name: Commit source changes
        shell: bash
        run: |
          rm .github/workflows/apply-detail-tab-overflow.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ui): standardize responsive detail tab overflow"
          git push origin HEAD:fix/detail-tabs-responsive-overflow
