name: grcpc-test

services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: grcpc-test-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: GRCPC
      APP_USER_PASSWORD: grcpc
    ports:
      - "1521:1521"
    volumes:
      - type: bind
        source: ./data/oracle/oradata
        target: /opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 90s

  minio:
    image: minio/minio:latest
    container_name: grcpc-test-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - type: bind
        source: ./data/minio
        target: /data

  minio-init:
    image: minio/mc:latest
    container_name: grcpc-test-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/grcpc-documents || true;
      exit 0;
      "
    restart: "no"

  app:
    image: eclipse-temurin:21-jre-noble
    container_name: grcpc-test-app
    restart: unless-stopped
    working_dir: /opt/grcpc
    depends_on:
      oracle:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - type: bind
        source: ./grcpc-app.jar
        target: /opt/grcpc/grcpc-app.jar
        read_only: true
      - type: bind
        source: ./data/app/logs
        target: /opt/grcpc/logs
    environment:
      SERVER_PORT: 8080

      DB_URL: jdbc:oracle:thin:@//oracle:1521/FREEPDB1
      DB_USERNAME: GRCPC
      DB_PASSWORD: grcpc
      DB_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
      DB_SCHEMA: GRCPC
      FLYWAY_ENABLED: "true"

      MINIO_ENABLED: "true"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: grcpc-documents

      APP_LOGGING_PATH: /opt/grcpc/logs
      ROOT_LOG_LEVEL: INFO
      APP_LOG_LEVEL: DEBUG
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "8080:8080"
    command: ["sh", "-c", "exec java $${JAVA_OPTS:-} -jar /opt/grcpc/grcpc-app.jar"]